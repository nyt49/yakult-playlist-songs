<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>樂多的歌單</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 背景香檳灑落動畫 -->
  <div class="bubbles-container" id="bubblesContainer"></div>

  <!-- 主容器 -->
  <div class="main-wrapper">
    <header class="site-header">
      <div class="champagne-deco left">🥂</div>
      <h1 class="site-title">樂多的歌單</h1>
      <p class="site-subtitle">養樂多嗎🥂</p>
      <button class="random-song-btn" id="randomSongBtn" title="隨機播放一首歌">🎲 隨機一首</button>
      <div class="champagne-deco right">🥂</div>
    </header>

    <div class="card-container">
      <!-- 搜尋列 -->
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="搜尋歌曲或歌手..." />
        <span class="search-icon">🔍</span>
      </div>

      <!-- 篩選按鈕區 -->
      <div class="filter-section">

        <div class="filter-group">
          <span class="filter-label">分類</span>
          <div class="filter-buttons" id="categoryButtons">
            <button class="filter-btn" data-tag="推薦">推薦</button>
            <button class="filter-btn" data-tag="新歌">新歌</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">語言</span>
          <div class="filter-buttons" id="languageButtons">
            <button class="filter-btn" data-tag="中文">中文</button>
            <button class="filter-btn" data-tag="台語">台語</button>
            <button class="filter-btn" data-tag="韓文">韓文</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">氛圍</span>
          <div class="filter-buttons" id="moodButtons">
            <button class="filter-btn" data-tag="全糖甜心">全糖甜心</button>
            <button class="filter-btn" data-tag="微苦心情">微苦心情</button>
          </div>
        </div>
        <div class="filter-group">
          <span class="filter-label">歌手</span>
          <div class="filter-buttons" id="artistButtons">
          </div>
        </div>
      </div>

      <!-- 已選標籤 & 清除 -->
      <div class="active-filters-row" id="activeFiltersRow">
        <span class="active-filters-label" id="activeFiltersLabel">尚未選擇任何分類</span>
        <button class="clear-btn" id="clearBtn">清除篩選</button>
      </div>

      <!-- 歌曲數量 -->
      <div class="song-count" id="songCount">共 0 首歌曲</div>

      <!-- 歌單列表 -->
      <div class="song-grid" id="songGrid">
        <!-- 動態生成 -->
      </div>
    </div>
  </div>

  <!-- 隨機歌曲彈出視窗 -->
  <div class="random-song-modal" id="randomSongModal">
    <div class="random-song-content">
      <span class="random-song-emoji" id="randomSongEmoji">🎵</span>
      <div class="random-song-title" id="randomSongTitle">歌曲名稱</div>
      <div class="random-song-artist" id="randomSongArtist">歌手</div>
      <div class="random-song-tags" id="randomSongTags"></div>
      <div class="random-song-buttons">
        <button class="random-song-btn-next" id="randomSongBtnNext">🎲 再一首</button>
        <button class="random-song-btn-close" id="randomSongBtnClose">關閉</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
